<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Moisés Núñez — Asesor inmobiliario con respaldo legal. Compra, venta y estrategia patrimonial con claridad." />
    <meta name="theme-color" content="#F5F5F7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MNT" />
    <title>MNT — Moisés Núñez · Asesor Inmobiliario</title>

    <!-- Apple-like system typography: clean sans, no external font dependency -->

    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Moisés Núñez — Asesor Inmobiliario" />
    <meta property="og:description" content="Compra, venta y estrategia patrimonial con una asesoría moderna, directa y fácil de entender." />
    <meta property="og:image" content="/og-card.svg" />
    <meta property="og:locale" content="es_MX" />
    <meta property="profile:first_name" content="Moisés" />
    <meta property="profile:last_name" content="Núñez" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Moisés Núñez",
      "jobTitle": "Asesor inmobiliario con respaldo legal",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tijuana",
        "addressRegion": "Baja California",
        "addressCountry": "MX"
      }
    }
    </script>

    <script>
      // MD3: Apply theme immediately to prevent flash of wrong theme
      (function () {
        var stored = localStorage.getItem('mnt-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : 'light';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
