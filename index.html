<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Moisés Núñez — Consultor inmobiliario en Tijuana, BC. Compra, venta, renta y asesoría legal de propiedades." />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#1565c0" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MNT" />
    <title>MNT — Moisés Núñez · Consultor Inmobiliario</title>

    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Moisés Núñez — Consultor Inmobiliario" />
    <meta property="og:description" content="Asesoría inmobiliaria en Tijuana, BC. Compra, venta, renta y servicios legales." />
    <meta property="og:locale" content="es_MX" />
    <meta property="profile:first_name" content="Moisés" />
    <meta property="profile:last_name" content="Núñez" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Moisés Núñez",
      "jobTitle": "Consultor Inmobiliario",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tijuana",
        "addressRegion": "Baja California",
        "addressCountry": "MX"
      }
    }
    </script>

    <script>
      // Evitar flash de tema incorrecto
      (function () {
        try {
          const stored = localStorage.getItem('mnt-theme');
          const theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.dataset.theme = theme;
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
