<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="description" content="Moisés Núñez — Consultor inmobiliario en Tijuana, BC. Compra, venta, renta y asesoría legal de propiedades." />
    <meta name="theme-color" content="#FFFFFF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="MNT" />
    <title>MNT — Moisés Núñez · Consultor Inmobiliario</title>

    <!-- MD3 Typography: Roboto (weights 400, 500, 700 per spec) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

    <meta property="og:type" content="profile" />
    <meta property="og:title" content="Moisés Núñez — Consultor Inmobiliario" />
    <meta property="og:description" content="Asesoría inmobiliaria en Tijuana, BC. Compra, venta, renta y servicios legales." />
    <meta property="og:locale" content="es_MX" />
    <meta property="profile:first_name" content="Moisés" />
    <meta property="profile:last_name" content="Núñez" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Moisés Núñez",
      "jobTitle": "Consultor Inmobiliario",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Tijuana",
        "addressRegion": "Baja California",
        "addressCountry": "MX"
      }
    }
    </script>

    <script>
      // MD3: Apply theme immediately to prevent flash of wrong theme
      (function () {
        var stored = localStorage.getItem('mnt-theme');
        var theme = (stored === 'light' || stored === 'dark')
          ? stored
          : 'light';
        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
